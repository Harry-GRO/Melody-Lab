{% extends 'app/base.html' %}

{% block content %}
    <h1 class="title">Melody Lab</h1>
    <h2 class="subtitle">Upload an audio file to get started</h2>

    <div class="container">
        <div class="form-card">
            <form method="post" enctype="multipart/form-data" id="fileUploadForm">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="button form-submit">Upload</button>
            </form>
        </div>
    </div>
{% endblock content %}
