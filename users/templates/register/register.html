{% extends "app/base.html" %}

{% block content %}
    <div class="container">
        <div class="form-card">
            <h2>Register</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="button form-submit">Register</button>
            </form>
            <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
        </div>
    </div>
{% endblock %}
